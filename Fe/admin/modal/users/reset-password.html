<div
  class="modal"
  id="resetPasswordModal"
>

  <div class="modal-content">

    <div class="modal-header">

      <h2>
        Reset mật khẩu
      </h2>

      <button
        class="close-modal-btn"
        onclick="closeResetPasswordModal()"
      >
        ✕
      </button>

    </div>

    <p class="confirm-text">
      Bạn sắp reset mật khẩu của tài khoản:
    </p>

    <div class="user-reset-info">

      <div class="reset-info-item">

        <span class="reset-label">
          Username
        </span>

        <span id="resetUsername">
          -
        </span>

      </div>

      <div class="reset-info-item">

        <span class="reset-label">
          Email
        </span>

        <span id="resetEmail">
          -
        </span>

      </div>

    </div>

    <div class="warning-box">

      <p class="warning-title">
        CẢNH BÁO
      </p>

      <p>
        Mật khẩu sẽ bị reset về:
      </p>

      <div class="default-password-box">
        News2106
      </div>

    </div>

    <div class="modal-actions">

      <button
        class="cancel-btn"
        onclick="closeResetPasswordModal()"
      >
        Huỷ
      </button>

      <button
        class="confirm-btn"
        onclick="confirmResetPasswordStep2()"
      >
        Tiếp tục
      </button>

    </div>

  </div>

</div>


<!-- CONFIRM STEP 2 -->

<div
  class="modal"
  id="resetPasswordConfirmModal"
>

  <div class="modal-content small-modal">

    <h3>
      Xác nhận reset mật khẩu
    </h3>

    <p class="confirm-text">
      Hành động này sẽ đưa mật khẩu
      về mặc định:
    </p>

    <div class="default-password-box">
      News2106
    </div>

    <div class="modal-actions">

      <button
        class="cancel-btn"
        onclick="closeResetPasswordConfirmModal()"
      >
        Huỷ
      </button>

      <button
        class="confirm-btn danger-btn"
        onclick="submitResetPassword()"
      >
        Reset mật khẩu
      </button>

    </div>

  </div>

</div>
