<!-- ROLE MODAL -->
<div
  class="modal"
  id="roleModal">
  <div class="modal-content">
    <h2 id="roleModalTitle">
      Thêm nhóm
    </h2>
    <div class="input-group">
      <label>
        Tên nhóm
      </label>
      <input
        type="text"
        id="roleName"
        placeholder="Nhập tên nhóm"
      >
    </div>
    <div class="input-group">
      <label>
        Mô tả
      </label>
      <input
        type="text"
        id="roleDescription"
        placeholder="Nhập mô tả"
      >
    </div>
    <div class="modal-actions">
      <button
        class="cancel-btn"
        onclick="closeRoleModal()"
      >
        Huỷ
      </button>
      <button
        class="save-btn"
        id="saveRoleBtn"
      >
        Lưu
      </button>
    </div>
  </div>
</div>
