<div
  class="modal"
  id="permissionModal">

  <div class="modal-content permission-modal">

    <div class="modal-header">

      <h3 id="permissionModalTitle">
        Quyền module
      </h3>

    </div>

    <div
      id="permissionCheckboxList"
      class="permission-checkbox-list"
    ></div>

    <div class="modal-actions">

      <button
        class="cancel-btn"
        onclick="closePermissionModal()"
      >
        Huỷ
      </button>

      <button
        class="save-btn"
        onclick="savePermissions()"
      >
        Lưu thay đổi
      </button>

    </div>

  </div>

</div>
