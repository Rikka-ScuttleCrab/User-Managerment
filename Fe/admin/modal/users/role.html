<div
  class="modal"
  id="roleModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>
        Phân nhóm người dùng
      </h2>
      <button
        class="close-modal-btn"
        onclick="closeRoleModal()"
      >
        ✕
      </button>
    </div>
    <div
      id="roleCheckboxList"
      class="role-checkbox-list"
    ></div>
    <div class="modal-actions">
      <button
        class="cancel-btn"
        onclick="closeRoleModal()"
      >
        Huỷ
      </button>
      <button
        class="confirm-btn"
        onclick="saveUserRoles()"
      >
        Lưu
      </button>
    </div>
  </div>
</div>
