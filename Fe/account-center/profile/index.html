<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hồ sơ cá nhân</title>

  <link rel="stylesheet" href="/Fe/css/profile.css">
</head>

<body>

    <nav class="navbar">

        <div
            class="logo"
            onclick="goHome()">
            NEWS TODAY
        </div>

        <div class="nav-right">

            <button
            class="back-btn"
            onclick="goAccountCenter()"
            >
            Quay lại
            </button>

        </div>

    </nav>

  <div class="profile-container">

    <!-- PROFILE -->

    <div class="profile-card">

      <h2>Thông tin cá nhân</h2>

      <div class="info-group">
        <label>Nickname</label>
        <input type="text" id="profileNickname">
      </div>

      <div class="info-group">
        <label>Username</label>
        <input type="text" id="profileUsername" disabled>
      </div>

      <div class="info-group">
        <label>Email</label>
        <input type="text" id="profileEmail">
      </div>

      <div class="info-group">
        <label>Gender</label>

        <select id="profileGender">

          <option value="MALE">MALE</option>
          <option value="FEMALE">FEMALE</option>
          <option value="OTHER">OTHER</option>

        </select>

      </div>

      <button
        class="save-btn"
        onclick="updateProfile()"
      >
        Cập nhật thông tin
      </button>

    </div>

    <!-- PASSWORD -->

    <div class="profile-card">

      <h2>Đổi mật khẩu</h2>

      <div class="info-group">
        <label>Mật khẩu cũ</label>

        <input
          type="password"
          id="oldPassword"
        >
      </div>

      <div class="info-group">
        <label>Mật khẩu mới</label>

        <input
          type="password"
          id="newPassword"
        >
      </div>

      <div class="info-group">
        <label>Xác nhận mật khẩu</label>

        <input
          type="password"
          id="confirmNewPassword"
        >
      </div>

      <button
        class="save-btn"
        onclick="changedPassword()"
      >
        Đổi mật khẩu
      </button>

      <div
        id="password-message"
        class="password-message"
      ></div>

    </div>

  </div>
  
  <script src="/Fe/js/app.js"></script>
  <script src="/Fe/js/config.js"></script>
  <script src="/Fe/js/auth.js"></script>
  <script src="/Fe/js/token.js"></script>
  <script src="/Fe/js/user.js"></script>
  <script src="/Fe/js/profile.js"></script>

  </script>

</body>

</html>
